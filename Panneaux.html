<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panneaux de Signalisation Routière</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #2c6fd1;
            --dark-blue: #1a4b8c;
            --danger-red: #e74c3c;
            --success-green: #27ae60;
            --warning-yellow: #f39c12;
            --light-gray: #f5f7fa;
            --dark-gray: #7f8c8d;
            --shadow: 0 15px 30px rgba(0,0,0,0.15);
            --transition: all 0.3s ease;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #e6f0ff 100%); color: #333; line-height: 1.6; min-height: 100vh; }
        
        /* Header */
        header { 
            text-align: center; 
            margin: 20px; 
            padding: 40px 20px; 
            background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue)); 
            color: white; 
            border-radius: 20px; 
            box-shadow: var(--shadow); 
            position: relative; 
            overflow: hidden; 
        }
        header::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            height: 20px;
            background: #ffcc00;
            transform: rotate(-2deg);
            z-index: 1;
        }
        h1 { font-size: 2.5rem; margin-bottom: 15px; text-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        /* Container principal */
        .main-container { padding: 20px; }
        
        /* Grille des catégories */
        .categories-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            max-width: 1400px; 
            margin: 0 auto 40px; 
        }
        
        /* Carte de catégorie */
        .category-card { 
            background: white; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            transition: var(--transition); 
            cursor: pointer; 
            border: 3px solid transparent;
            animation: card-enter 0.5s forwards;
            opacity: 0;
        }
        .category-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); 
        }
        
        /* En-tête de carte avec logo */
        .card-header { 
            padding: 25px 20px; 
            color: white; 
            text-align: center; 
            min-height: 140px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            font-size: 1.3rem; 
            font-weight: 700; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            position: relative;
        }
        .card-logo {
            font-size: 2.5rem;
            margin-bottom: 15px;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }
        
        /* Couleurs par catégorie */
        .danger .card-header { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .interdiction .card-header { background: linear-gradient(135deg, #c0392b, #a23526); }
        .obligation .card-header { background: linear-gradient(135deg, #3498db, #2980b9); }
        .indication .card-header { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .arret .card-header { background: linear-gradient(135deg, #d35400, #ba4a00); }
        .priorite .card-header { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .lumineux .card-header { background: linear-gradient(135deg, #16a085, #1abc9c); }
        .temporaire .card-header { background: linear-gradient(135deg, #f1c40f, #f39c12); }
        .balise .card-header { background: linear-gradient(135deg, #2c3e50, #34495e); }
        .passageniveau .card-header { background: linear-gradient(135deg, #8e44ad, #9b59b6); }
        
        /* Contenu de carte */
        .card-content { 
            padding: 25px 20px; 
            background: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 120px; 
        }
        .card-text { 
            text-align: center; 
            font-size: 1.1rem; 
            line-height: 1.7; 
            color: #2d3748; 
            font-weight: 500; 
        }
        
        /* Étude des panneaux */
        .study-container { 
            max-width: 1400px; 
            margin: 0 auto; 
            animation: fadeIn 0.5s ease; 
        }
        
        /* En-tête étude */
        .study-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            flex-wrap: wrap; 
            gap: 15px; 
        }
        .study-title { 
            font-size: 1.8rem; 
            color: var(--primary-blue); 
            font-weight: 700; 
        }
        
        /* Vue tous les panneaux - 4 PAR LIGNE */
        .all-signs-view {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 colonnes */
            gap: 25px;
            margin-top: 30px;
        }
        
        /* Carte de panneau individuel */
        .sign-card { 
            background: white; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
            transition: var(--transition); 
            border: 2px solid #e0e0e0;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .sign-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.15); 
            border-color: var(--primary-blue);
        }
        
        /* Image du panneau */
        .sign-image-container { 
            width: 100%; 
            height: 150px; /* Hauteur réduite pour 4 par ligne */
            background: linear-gradient(135deg, #f8f9fa, #e9ecef); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            border-bottom: 1px solid #eee; 
        }
        .sign-img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            transition: transform 0.3s ease; 
        }
        .sign-card:hover .sign-img { transform: scale(1.05); }
        
        /* Info du panneau */
        .sign-info { 
            padding: 15px; 
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .sign-name { 
            font-size: 1rem; /* Taille réduite */
            font-weight: 700; 
            color: #2c3e50; 
            margin-bottom: 8px; 
            text-align: center;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sign-description { 
            font-size: 0.85rem; /* Taille réduite */
            color: #4a5568; 
            margin-bottom: 10px; 
            line-height: 1.4;
            flex-grow: 1;
        }
        
        /* Contrôles audio - Style carré */
        .audio-controls { 
            display: flex; 
            gap: 8px; 
            justify-content: center; 
            flex-wrap: wrap; 
            margin-top: 5px;
        }
        .audio-btn { 
            padding: 8px 12px; 
            border: none; 
            border-radius: 6px; 
            font-size: 0.8rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: var(--transition); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 5px; 
            min-width: 90px; /* Largeur réduite */
            box-shadow: 0 3px 8px rgba(0,0,0,0.1); 
        }
        .audio-btn.fr { background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue)); color: white; }
        .audio-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 12px rgba(0,0,0,0.2); }
        
        /* Navigation */
        .study-navigation { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 40px; 
            flex-wrap: wrap; 
            gap: 15px; 
        }
        .nav-btn { 
            padding: 12px 25px; 
            border: none; 
            border-radius: 25px; 
            font-size: 1rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: var(--transition); 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
        }
        .nav-btn.prev { background: linear-gradient(135deg, var(--dark-gray), #95a5a6); color: white; }
        .nav-btn.next { background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue)); color: white; }
        .nav-btn:disabled { background: #bdc3c7; cursor: not-allowed; transform: none; box-shadow: none; }
        .nav-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        
        /* Compteur */
        .sign-counter { 
            text-align: center; 
            margin-top: 15px; 
            font-size: 1.1rem; 
            color: var(--dark-gray); 
            font-weight: 600; 
        }
        
        /* Onglets de navigation */
        .tabs-container {
            display: flex;
            background: white;
            border-radius: 12px;
            padding: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            overflow: hidden;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 30px;
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            border-radius: 8px;
            color: var(--dark-gray);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .tab:hover {
            background: #f8f9fa;
        }
        .tab.active {
            background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue));
            color: white;
            box-shadow: 0 4px 10px rgba(44, 111, 209, 0.3);
        }
        
        /* Boutons principaux */
        .btn { 
            padding: 12px 25px; 
            border: none; 
            border-radius: 25px; 
            font-size: 1rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: var(--transition); 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
        }
        .btn-primary { 
            background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue)); 
            color: white; 
        }
        .btn-success { 
            background: linear-gradient(135deg, var(--success-green), #2ecc71); 
            color: white; 
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        /* Footer */
        footer { 
            text-align: center; 
            margin-top: 50px; 
            padding: 25px; 
            color: var(--dark-gray); 
            font-size: 0.9rem; 
            border-top: 1px solid #ddd; 
        }
        
        /* ============================================
           MODE DÉTAIL - VUE MOBILE FIXE
           ============================================ */

        /* Conteneur principal pour le mode détail */
        .detail-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 1000;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        /* Header fixe pour le mode détail */
        .detail-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue));
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .detail-title {
            font-size: 1.5rem;
            font-weight: 700;
            flex: 1;
        }

        /* Contenu détail scrollable */
        .detail-content {
            flex: 1;
            padding: 0;
            overflow-y: auto;
        }

        /* Carte de panneau en mode détail */
        .detail-card {
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: calc(100vh - 70px); /* Hauteur moins le header */
        }

        /* Image du panneau en détail */
        .detail-image-container {
            width: 100%;
            max-width: 400px;
            height: 250px;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            border: 3px solid var(--primary-blue);
        }

        .detail-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Info du panneau en détail */
        .detail-info {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .detail-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        .detail-description {
            font-size: 1.2rem;
            color: #4a5568;
            margin-bottom: 35px;
            line-height: 1.6;
            padding: 0 15px;
        }

        /* Contrôles audio en mode détail */
        .detail-audio-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
        }

        .detail-audio-btn {
            padding: 18px 25px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .detail-audio-btn.fr {
            background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue));
            color: white;
        }

        .detail-audio-btn:active {
            transform: translateY(-1px);
        }

        /* Indicateur de progression */
        .detail-progress {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 1rem;
            z-index: 101;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Contrôles de navigation flottants */
        .detail-nav-controls {
            position: fixed;
            bottom: 80px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 25px;
            z-index: 100;
        }

        .detail-nav-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue));
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(44, 111, 209, 0.4);
        }

        .detail-nav-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .detail-nav-btn:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.1);
            box-shadow: 0 10px 25px rgba(44, 111, 209, 0.5);
        }

        .detail-nav-btn:active:not(:disabled) {
            transform: translateY(-1px);
        }

        /* Bouton retour à la grille */
        .detail-back-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--warning-yellow), #e67e22);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(243, 156, 18, 0.4);
            z-index: 101;
        }

        .detail-back-btn:hover {
            transform: translateY(-3px) rotate(-15deg);
            box-shadow: 0 10px 25px rgba(243, 156, 18, 0.5);
        }

        /* Animation d'entrée */
        @keyframes detailSlideIn {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .detail-card {
            animation: detailSlideIn 0.4s ease-out;
        }
        
        /* Animations */
        @keyframes card-enter { 
            0% { opacity: 0; transform: translateY(30px); } 
            100% { opacity: 1; transform: translateY(0); } 
        }
        @keyframes fadeIn { 
            from { opacity: 0; } 
            to { opacity: 1; } 
        }
        
        /* Délais d'animation */
        .category-card { animation-delay: calc(var(--card-index) * 0.1s); }
        
        /* Responsive pour 4 colonnes */
        @media (max-width: 1200px) {
            .all-signs-view {
                grid-template-columns: repeat(3, 1fr); /* 3 colonnes sur tablette */
            }
        }
        
        @media (max-width: 900px) {
            .all-signs-view {
                grid-template-columns: repeat(2, 1fr); /* 2 colonnes sur mobile paysage */
            }
            .sign-image-container { height: 140px; }
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .categories-grid { grid-template-columns: repeat(2, 1fr); } /* 2 colonnes pour catégories */
            .category-card { margin: 0; }
            .card-header { min-height: 120px; padding: 20px; font-size: 1.2rem; }
            .card-logo { font-size: 2rem; width: 60px; height: 60px; }
            .card-content { min-height: 100px; padding: 20px; }
            .study-header { flex-direction: column; text-align: center; }
            .study-navigation { flex-direction: column; }
            .nav-btn { width: 100%; justify-content: center; }
            .audio-btn { min-width: 80px; padding: 7px 10px; }
            .all-signs-view { grid-template-columns: repeat(2, 1fr); }
            .tabs-container { max-width: 400px; }
            
            /* Mode détail mobile */
            .detail-header {
                padding: 15px;
            }
            
            .detail-title {
                font-size: 1.3rem;
            }
            
            .detail-card {
                padding: 20px 15px;
                min-height: calc(100vh - 60px);
            }
            
            .detail-image-container {
                height: 200px;
                max-width: 320px;
                padding: 20px;
                margin-bottom: 25px;
            }
            
            .detail-name {
                font-size: 1.5rem;
                margin-bottom: 15px;
            }
            
            .detail-description {
                font-size: 1.1rem;
                margin-bottom: 25px;
                padding: 0 10px;
            }
            
            .detail-audio-btn {
                padding: 16px 20px;
                font-size: 1rem;
            }
            
            .detail-nav-controls {
                padding: 0 20px;
                bottom: 70px;
            }
            
            .detail-nav-btn {
                width: 55px;
                height: 55px;
                font-size: 1.3rem;
            }
            
            .detail-back-btn {
                width: 55px;
                height: 55px;
                bottom: 15px;
                right: 15px;
            }
            
            .detail-progress {
                bottom: 15px;
                font-size: 0.9rem;
                padding: 10px 20px;
            }
        }
        
        @media (max-width: 600px) {
            .all-signs-view {
                grid-template-columns: 1fr; /* 1 colonne sur mobile portrait */
            }
            .categories-grid { grid-template-columns: 1fr; } /* 1 colonne pour catégories */
            .sign-image-container { height: 150px; }
            .sign-name { font-size: 1.1rem; min-height: auto; }
            .sign-description { font-size: 0.9rem; }
            .audio-controls { flex-direction: column; align-items: center; }
            .audio-btn { width: 100%; max-width: 200px; }
            .tabs-container { max-width: 350px; }
            
            /* Mode détail mobile */
            .detail-header {
                padding: 12px;
            }
            
            .detail-title {
                font-size: 1.1rem;
            }
            
            .detail-card {
                padding: 15px 10px;
            }
            
            .detail-image-container {
                height: 180px;
                max-width: 280px;
                padding: 15px;
                margin-bottom: 20px;
            }
            
            .detail-name {
                font-size: 1.3rem;
                margin-bottom: 12px;
            }
            
            .detail-description {
                font-size: 1rem;
                margin-bottom: 20px;
                padding: 0;
            }
            
            .detail-audio-btn {
                padding: 14px 18px;
                font-size: 0.95rem;
                gap: 10px;
            }
            
            .detail-audio-controls {
                max-width: 280px;
            }
            
            .detail-nav-controls {
                padding: 0 15px;
                bottom: 65px;
            }
            
            .detail-nav-btn {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
            
            .detail-back-btn {
                width: 50px;
                height: 50px;
                font-size: 1.1rem;
            }
            
            .detail-progress {
                font-size: 0.85rem;
                padding: 8px 16px;
            }
        }
        
        @media (max-width: 480px) {
            .all-signs-view { gap: 15px; }
            .sign-card { margin: 0 5px; }
            .tabs-container { 
                flex-direction: column; 
                max-width: 300px; 
                padding: 10px;
            }
            .tab { margin-bottom: 5px; }
        }
        
        /* État désactivé pour écran tactile */
        @media (hover: none) and (pointer: coarse) {
            .detail-audio-btn:active,
            .detail-nav-btn:active,
            .detail-back-btn:active {
                transform: scale(0.95);
            }
            
            .detail-audio-btn:hover,
            .detail-nav-btn:hover,
            .detail-back-btn:hover {
                transform: none;
            }
        }
    </style>
</head>
<body>
    <!-- Header masqué en mode étude -->
    <header id="main-header">
        <h1>Panneaux de Signalisation Routière</h1>
        <p class="description" id="header-description">Apprenez et maîtrisez tous les panneaux de signalisation routière pour réussir votre code de la route</p>
    </header>
    
    <div class="main-container">
        <!-- Container principal pour les catégories -->
        <div id="categories-view">
            <div class="categories-grid" id="categories-grid">
                <!-- Les cartes seront générées dynamiquement -->
            </div>
        </div>
        
        <!-- Container pour l'étude des panneaux -->
        <div id="study-view" class="study-container" style="display: none;">
            <div class="study-header">

                    { id: "b4", name: "Délinéateur", image: "Images/Balise/Délinéateur.jpeg", description: "Guide le conducteur en délimitant les bords de la chaussée (souvent réfléchissant)." },
                    { id: "b5", name: "Balise de virage (explicative)", image: "Images/Balise/Balise de virage (explicative).jpeg", description: "Utilisée pour jalonner des virages significativement dangereux ou matérialiser un rétrécissement de chaussée." },
                    { id: "b6", name: "Tête d'îlot directionnel à contournement par la droite", image: "Images/Balise/Tête d'îlot directionnel à contournement par la droite.jpeg", description: "Indique que l'îlot central doit être contourné par la droite." },
                    { id: "b7", name: "Balise d'obstacle", image: "Images/Balise/Balise d'obstacle.jpeg", description: "Signale de petits obstacles à proximité immédiate de la chaussée (bornes, poteaux, etc.)." }
                ]
            },
            {
                id: "passageniveau",
                name: "PASSAGES À NIVEAU",
                description: "Signalisation pour les passages à niveau ferroviaires",
                color: "passageniveau",
                logo: "🚂",
                signs: [
                    { id: "pn1", name: "Passage à niveau muni de barrières à fonctionnement manuel", image: "Images/Passageaniveau/Passage à niveau muni de barrières à fonctionnement manuel.jpeg", description: "Passage à niveau avec barrières manuelles." },
                    { id: "pn2", name: "Passage à niveau muni de demi-barrières à fonctionnement automatique", image: "Images/Passageaniveau/Passage à niveau muni de demi-barrières à fonctionnement automatique.jpeg", description: "Passage à niveau avec demi-barrières automatiques." },
                    { id: "pn3", name: "Balises d'annonce d'un passage à niveau", image: "Images/Passageaniveau/Balises d'annonce d'un passage à niveau.jpeg", description: "Balises indiquant l'approche d'un passage à niveau." },
                    { id: "pn4", name: "UN TRAIN PEUT EN CACHER UN AUTRE – fonctionnement automatique", image: "Images/Passageaniveau/UN TRAIN PEUT EN CACHER UN AUTRE – fonctionnement automatique.jpeg", description: "Alerte sur le fonctionnement automatique avec demi-barrières, feux et sonnerie." },
                    { id: "pn5", name: "La voie ferrée que je vais traverser sera électrifiée", image: "Images/Passageaniveau/La voie ferrée que je vais traverser sera électrifiée.jpeg", description: "Avertit que la voie est électrifiée." },
                    { id: "pn6", name: "Portique HAUTE TENSION DANGER", image: "Images/Passageaniveau/Portique HAUTE TENSION DANGER.jpeg", description: "Portique indiquant un danger haute tension." },
                    { id: "pn7", name: "Passage à niveau sans barrières ni demi-barrières", image: "Images/Passageaniveau/Passage à niveau sans barrières ni demi-barrières.jpeg", description: "Passage à niveau non équipé de barrières." },
                    { id: "pn8", name: "Signalisation de position (1 voie, sans barrières)", image: "Images/Passageaniveau/Signalisation de position (1 voie, sans barrières).jpeg", description: "Position pour passage à niveau 1 voie sans barrières." },
                    { id: "pn9", name: "Signalisation de position (plusieurs voies, sans barrières)", image: "Images/Passageaniveau/Signalisation de position (plusieurs voies, sans barrières).jpeg", description: "Position pour passage à niveau multi-voies sans barrières." },
                    { id: "pn10", name: "Signalisation de position (1 voie, avec signalisation automatique lumineuse et sonore)", image: "Images/Passageaniveau/Signalisation de position (1 voie, avec signalisation automatique lumineuse et sonore).jpeg", description: "Position avec signalisation automatique." }
                ]
            }
        ];
        
        // ============================================
        // ÉTAT DE L'APPLICATION
        // ============================================
        
        let appState = {
            currentView: 'categories',
            currentCategory: null,
            currentSignIndex: 0,
            currentTab: 'all', // 'all' ou 'one'
            userProgress: {}
        };
        
        // ============================================
        // INITIALISATION
        // ============================================
        
        document.addEventListener('DOMContentLoaded', function() {
            loadProgress();
            renderCategories();
        });
        
        // ============================================
        // GESTION DES DONNÉES
        // ============================================
        
        function loadProgress() {
            const saved = localStorage.getItem('roadSignsProgress');
            if (saved) {
                appState.userProgress = JSON.parse(saved);
            } else {
                // Initialiser le progrès
                categories.forEach(cat => {
                    appState.userProgress[cat.id] = {
                        studied: true,
                        testCompleted: true,
                        testScore: 10
                    };
                });
                saveProgress();
            }
        }
        
        function saveProgress() {
            localStorage.setItem('roadSignsProgress', JSON.stringify(appState.userProgress));
        }
        
        // ============================================
        // RENDU DES VUES
        // ============================================
        
        function renderCategories() {
            const grid = document.getElementById('categories-grid');
            grid.innerHTML = '';
            
            categories.forEach((category, index) => {
                const card = document.createElement('div');
                card.className = `category-card ${category.color}`;
                card.style.setProperty('--card-index', index);
                card.onclick = () => selectCategory(category);
                
                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-logo">${category.logo}</div>
                        <div>${category.name}</div>
                        <div style="margin-top: 10px; font-size: 0.9rem; opacity: 0.9;">
                            ${category.signs.length} panneaux
                        </div>
                    </div>
                    <div class="card-content">
                        <p class="card-text">${category.description}</p>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }
        
        function renderStudyView() {
            const category = categories.find(c => c.id === appState.currentCategory);
            if (!category) return;
            
            // Masquer le header principal
            document.getElementById('main-header').style.display = 'none';
            
            document.getElementById('study-title').textContent = `${category.name} - ${category.signs.length} Panneaux`;
            document.getElementById('categories-view').style.display = 'none';
            document.getElementById('study-view').style.display = 'block';
            
            // Réinitialiser l'onglet actif
            appState.currentTab = 'all';
            document.getElementById('tab-all').classList.add('active');
            document.getElementById('tab-one').classList.remove('active');
            
            renderCurrentView();
        }
        
        function renderCurrentView() {
            const studyContent = document.getElementById('study-content');
            studyContent.innerHTML = '';
            
            if (appState.currentTab === 'all') {
                renderAllSignsView();
            } else {
                renderDetailView();
            }
        }
        
        function renderAllSignsView() {
            const category = categories.find(c => c.id === appState.currentCategory);
            const signs = category.signs;
            
            const studyContent = document.getElementById('study-content');
            
            const title = document.createElement('h3');
            title.textContent = `${category.name} - ${signs.length} Panneaux`;
            title.style.cssText = 'text-align: center; margin-bottom: 25px; color: var(--dark-blue); font-size: 1.4rem; font-weight: 700;';
            studyContent.appendChild(title);
            
            const grid = document.createElement('div');
            grid.className = 'all-signs-view';
            
            signs.forEach((sign, index) => {
                const signCard = document.createElement('div');
                signCard.className = 'sign-card';
                
                signCard.innerHTML = `
                    <div class="sign-image-container">
                        <img src="${sign.image}" 
                             alt="${sign.name}" 
                             class="sign-img"
                             onerror="this.src='https://via.placeholder.com/200x120/4A90E2/FFFFFF?text=${encodeURIComponent(sign.name.substring(0, 15))}'">
                    </div>
                    <div class="sign-info">
                        <h4 class="sign-name">${sign.name}</h4>
                        <p class="sign-description">${sign.description}</p>
                        
                        <div class="audio-controls">
                            <button class="audio-btn fr" onclick="playAudio('${sign.name}. ${sign.description}', 'fr')">
                                <i class="fas fa-volume-up"></i> Fr
                            </button>
                        </div>
                    </div>
                `;
                
                // Ajouter le bouton "Détails"
                const detailBtn = document.createElement('button');
                detailBtn.className = 'btn btn-primary';
                detailBtn.innerHTML = '<i class="fas fa-expand"></i> Détails';
                detailBtn.style.cssText = `
                    width: 100%;
                    margin-top: 10px;
                    padding: 8px;
                    font-size: 0.85rem;
                    border-radius: 8px;
                `;
                detailBtn.onclick = (e) => {
                    e.stopPropagation();
                    appState.currentSignIndex = index;
                    renderDetailView();
                };
                
                signCard.querySelector('.sign-info').appendChild(detailBtn);
                grid.appendChild(signCard);
            });
            
            studyContent.appendChild(grid);
            
            // Ajouter un bouton pour switcher en mode détail
            const detailBtn = document.createElement('button');
            detailBtn.className = 'btn btn-primary';
            detailBtn.innerHTML = '<i class="fas fa-expand-alt"></i> Voir en mode détail';
            detailBtn.onclick = () => {
                appState.currentTab = 'one';
                appState.currentSignIndex = 0;
                document.getElementById('tab-all').classList.remove('active');
                document.getElementById('tab-one').classList.add('active');
                renderCurrentView();
            };
            detailBtn.style.margin = '40px auto 20px';
            detailBtn.style.display = 'block';
            studyContent.appendChild(detailBtn);
        }
        
        // ============================================
        // MODE DÉTAIL - VUE MOBILE FIXE
        // ============================================
        
        function renderDetailView() {
            const category = categories.find(c => c.id === appState.currentCategory);
            const signs = category.signs;
            const sign = signs[appState.currentSignIndex];
            
            // Créer le conteneur détail
            const detailContainer = document.createElement('div');
            detailContainer.className = 'detail-container';
            detailContainer.id = 'detail-view';
            
            // Header fixe
            const detailHeader = document.createElement('div');
            detailHeader.className = 'detail-header';
            
            const detailTitle = document.createElement('div');
            detailTitle.className = 'detail-title';
            detailTitle.textContent = sign.name;
            
            const closeBtn = document.createElement('button');
            closeBtn.className = 'btn btn-primary';
            closeBtn.innerHTML = '<i class="fas fa-times"></i>';
            closeBtn.onclick = () => {
                detailContainer.remove();
                document.getElementById('study-view').style.display = 'block';
            };
            closeBtn.style.padding = '8px 12px';
            closeBtn.style.fontSize = '0.9rem';
            
            detailHeader.appendChild(detailTitle);
            detailHeader.appendChild(closeBtn);
            detailContainer.appendChild(detailHeader);
            
            // Contenu scrollable
            const detailContent = document.createElement('div');
            detailContent.className = 'detail-content';
            
            const detailCard = document.createElement('div');
            detailCard.className = 'detail-card';
            
            // Image du panneau
            const imageContainer = document.createElement('div');
            imageContainer.className = 'detail-image-container';
            
            const img = document.createElement('img');
            img.src = sign.image;
            img.alt = sign.name;
            img.className = 'detail-img';
            img.onerror = function() {
                this.src = `https://via.placeholder.com/350x200/4A90E2/FFFFFF?text=${encodeURIComponent(sign.name.substring(0, 25))}`;
            };
            
            imageContainer.appendChild(img);
            detailCard.appendChild(imageContainer);
            
            // Informations
            const infoContainer = document.createElement('div');
            infoContainer.className = 'detail-info';
            
            const nameElement = document.createElement('h2');
            nameElement.className = 'detail-name';
            nameElement.textContent = sign.name;
            
            const descriptionElement = document.createElement('p');
            descriptionElement.className = 'detail-description';
            descriptionElement.textContent = sign.description;
            
            infoContainer.appendChild(nameElement);
            infoContainer.appendChild(descriptionElement);
            
            // Contrôles audio
            const audioControls = document.createElement('div');
            audioControls.className = 'detail-audio-controls';
            
            const audioBtnFr = document.createElement('button');
            audioBtnFr.className = 'detail-audio-btn fr';
            audioBtnFr.innerHTML = '<i class="fas fa-volume-up"></i> Écouter en Français';
            audioBtnFr.onclick = () => playAudio(`${sign.name}. ${sign.description}`, 'fr');
            
            audioControls.appendChild(audioBtnFr);
            infoContainer.appendChild(audioControls);
            
            detailCard.appendChild(infoContainer);
            detailContent.appendChild(detailCard);
            detailContainer.appendChild(detailContent);
            
            // Indicateur de progression
            const progressIndicator = document.createElement('div');
            progressIndicator.className = 'detail-progress';
            progressIndicator.textContent = `${appState.currentSignIndex + 1}/${signs.length}`;
            detailContainer.appendChild(progressIndicator);
            
            // Navigation flottante
            if (signs.length > 1) {
                const navControls = document.createElement('div');
                navControls.className = 'detail-nav-controls';
                
                const prevBtn = document.createElement('button');
                prevBtn.className = 'detail-nav-btn';
                prevBtn.innerHTML = '<i class="fas fa-chevron-left"></i>';
                prevBtn.disabled = appState.currentSignIndex === 0;
                prevBtn.onclick = () => {
                    if (appState.currentSignIndex > 0) {
                        appState.currentSignIndex--;
                        detailContainer.remove();
                        renderDetailView();
                    }
                };
                
                const nextBtn = document.createElement('button');
                nextBtn.className = 'detail-nav-btn';
                nextBtn.innerHTML = '<i class="fas fa-chevron-right"></i>';
                nextBtn.disabled = appState.currentSignIndex === signs.length - 1;
                nextBtn.onclick = () => {
                    if (appState.currentSignIndex < signs.length - 1) {
                        appState.currentSignIndex++;
                        detailContainer.remove();
                        renderDetailView();
                    }
                };
                
                navControls.appendChild(prevBtn);
                navControls.appendChild(nextBtn);
                detailContainer.appendChild(navControls);
            }
            
            // Bouton retour à la grille
            const backBtn = document.createElement('button');
            backBtn.className = 'detail-back-btn';
            backBtn.innerHTML = '<i class="fas fa-th-large"></i>';
            backBtn.title = 'Retour à la grille';
            backBtn.onclick = () => {
                detailContainer.remove();
                document.getElementById('study-view').style.display = 'block';
            };
            
            detailContainer.appendChild(backBtn);
            
            // Ajouter au body et masquer la vue étude
            document.body.appendChild(detailContainer);
            document.getElementById('study-view').style.display = 'none';
        }
        
        // ============================================
        // FONCTIONS D'INTERACTION
        // ============================================
        
        function selectCategory(category) {
            appState.currentCategory = category.id;
            appState.currentSignIndex = 0;
            appState.currentView = 'study';
            
            renderStudyView();
            showNotification(`📚 Étude des panneaux: ${category.name}`);
        }
        
        function backToCategories() {
            // Réafficher le header principal
            document.getElementById('main-header').style.display = 'block';
            
            appState.currentView = 'categories';
            document.getElementById('study-view').style.display = 'none';
            document.getElementById('categories-view').style.display = 'block';
            
            renderCategories();
        }
        
        function switchTab(tab) {
            appState.currentTab = tab;
            appState.currentSignIndex = 0;
            
            // Mettre à jour les onglets actifs
            document.getElementById('tab-all').classList.remove('active');
            document.getElementById('tab-one').classList.remove('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            renderCurrentView();
        }
        
        // ============================================
        // FONCTIONS UTILITAIRES
        // ============================================
        
        function playAudio(text, language) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance();
                utterance.text = text;
                utterance.lang = language === 'fr' ? 'fr-FR' : 'wo-SN';
                utterance.rate = 0.9;
                utterance.pitch = 1;
                
                speechSynthesis.speak(utterance);
                showNotification(`🔊 Audio ${language === 'fr' ? 'français' : 'wolof'}`);
            } else {
                showNotification('❌ Synthèse vocale non supportée');
            }
        }
        
        function showNotification(message) {
            // Supprimer les notifications existantes
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            
            // Créer la nouvelle notification
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: linear-gradient(135deg, #2c6fd1, #1a4b8c);
                color: white;
                padding: 12px 20px;
                border-radius: 8px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                z-index: 1000;
                font-weight: 600;
                font-size: 0.9rem;
                animation: slideIn 0.3s ease;
            `;
            
            notification.textContent = message;
            document.body.appendChild(notification);
            
            // Animation d'entrée
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 2000);
            
            // Ajouter les styles d'animation s'ils n'existent pas
            if (!document.querySelector('#notification-styles')) {
                const style = document.createElement('style');
                style.id = 'notification-styles';
                style.textContent = `
                    @keyframes slideIn {
                        from { transform: translateX(100%); opacity: 0; }
                        to { transform: translateX(0); opacity: 1; }
                    }
                    @keyframes slideOut {
                        from { transform: translateX(0); opacity: 1; }
                        to { transform: translateX(100%); opacity: 0; }
                    }
                `;
                document.head.appendChild(style);
            }
        }
        
        // ============================================
        // EXPORT DES FONCTIONS GLOBALES
        // ============================================
        
        window.selectCategory = selectCategory;
        window.backToCategories = backToCategories;
        window.switchTab = switchTab;
        window.playAudio = playAudio;
// ============================================
// FILTRER LES CATÉGORIES - MASQUER SIGNALISATION LUMINEUSE
// ============================================

function renderCategories() {
    const grid = document.getElementById('categories-grid');
    grid.innerHTML = '';
    
    // Filtrer les catégories pour exclure "SIGNALISATION LUMINEUSE"
    const categoriesFiltered = categories.filter(category => 
        category.id !== "lumineux" // Exclure la catégorie signalisation lumineuse
    );
    
    categoriesFiltered.forEach((category, index) => {
        const card = document.createElement('div');
        card.className = `category-card ${category.color}`;
        card.style.setProperty('--card-index', index);
        card.onclick = () => selectCategory(category);
        
        card.innerHTML = `
            <div class="card-header">
                <div class="card-logo">${category.logo}</div>
                <div>${category.name}</div>
                <div style="margin-top: 10px; font-size: 0.9rem; opacity: 0.9;">
                    ${category.signs.length} panneaux
                </div>
            </div>
            <div class="card-content">
                <p class="card-text">${category.description}</p>
            </div>
        `;
        
        grid.appendChild(card);
    });
}
// ============================================
// 
// ============================================

let currentAudio = null;
let isAudioPlaying = false;

function playAudio(text, language) {
    // Arrêter l'audio en cours s'il joue
    if (isAudioPlaying) {
        stopAudio();
    }
    
    // Créer nouvel audio
    const utterance = new SpeechSynthesisUtterance();
    utterance.text = text;
    utterance.lang = 'fr-FR'; // Seulement français
    utterance.rate = 0.9;
    utterance.pitch = 1;
    
    // Gérer les événements
    utterance.onstart = () => {
        isAudioPlaying = true;
        currentAudio = utterance;
    };
    
    utterance.onend = () => {
        isAudioPlaying = false;
        currentAudio = null;
    };
    
    utterance.onerror = () => {
        isAudioPlaying = false;
        currentAudio = null;
    };
    
    // Lancer la lecture
    speechSynthesis.speak(utterance);
}

function stopAudio() {
    if (speechSynthesis.speaking) {
        speechSynthesis.cancel();
        isAudioPlaying = false;
        currentAudio = null;
    }
}
